name: Notify Website Docs Sync

on:
  push:
    branches:
      - main
    paths:
      - "docs/en/**"
      - "docs/vi/**"
  release:
    types:
      - published
      - edited

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch website docs sync
        env:
          GH_TOKEN: ${{ secrets.CLI_KNOWNS_DEV_DISPATCH_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            EVENT_TYPE="knowns-release-published"
          else
            EVENT_TYPE="knowns-docs-updated"
          fi

          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/knowns-dev/cli.knowns.dev/dispatches \
            -d @- <<JSON
          {
            "event_type": "${EVENT_TYPE}",
            "client_payload": {
              "before": "${BEFORE}",
              "after": "${AFTER}",
              "ref": "${REF_NAME}",
              "release_tag": "${RELEASE_TAG}"
            }
          }
          JSON
